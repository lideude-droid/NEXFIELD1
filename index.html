<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexfield</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface2: #1e2026;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.13);
      --text-primary: #f0f0f0;
      --text-secondary: #999;
      --text-muted: #555;
      --discord: #5865F2;
      --discord-hover: #4752c4;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; }
    .glow-bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% -10%, rgba(88,101,242,0.13) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* LOGIN */
    #screen-login { align-items: center; justify-content: center; padding: 2rem 1.25rem; }
    .login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      display: flex; flex-direction: column; align-items: center;
    }
    .logo-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; margin-bottom: 1.5rem; }
    .login-brand { text-align: center; margin-bottom: 2rem; }
    .login-brand h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .login-brand p { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }
    .divider { width: 100%; height: 1px; background: var(--border); margin-bottom: 1.75rem; }
    .discord-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px 20px; border-radius: 10px; border: none;
      background: var(--discord); color: #fff;
      font-family: 'Inter', system-ui, sans-serif; font-size: 15px; font-weight: 500;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s, transform 0.1s; margin-bottom: 1.5rem;
    }
    .discord-btn:hover { background: var(--discord-hover); }
    .discord-btn:active { transform: scale(0.98); }
    .discord-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .footer-text { font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.6; }
    .footer-text a { color: var(--text-secondary); text-decoration: none; }

    /* NAV */
    .nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(14,15,17,0.8); backdrop-filter: blur(12px);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .nav-logo span { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
    .nav-user { display: flex; align-items: center; gap: 8px; }
    .nav-user img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border2); }
    .nav-user span { font-size: 13px; color: var(--text-secondary); }

    /* DASHBOARD */
    #screen-dashboard { flex-direction: column; }
    .dash-content {
      position: relative; z-index: 1; flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 3rem 1.5rem 2rem;
    }
    .welcome-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 3rem; }
    .user-avatar-big {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--border2); margin-bottom: 1rem;
    }
    .welcome-section h2 { font-size: 22px; font-weight: 600; text-align: center; }
    .welcome-section h2 span { color: #818cf8; }
    .sport-label {
      font-size: 13px; color: var(--text-secondary);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1rem; text-align: center;
    }
    .sport-grid { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .sport-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem 1.25rem; width: 120px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .sport-card:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-2px); }
    .sport-card:active { transform: scale(0.97); }
    .sport-icon { font-size: 32px; line-height: 1; }
    .sport-card span { font-size: 13px; font-weight: 500; color: var(--text-secondary); }

    /* TABLE SCREEN */
    #screen-table { flex-direction: column; }
    .table-content {
      position: relative; z-index: 1; flex: 1;
      padding: 2rem 1.5rem; max-width: 720px; width: 100%; margin: 0 auto;
    }
    .table-header { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
    .back-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-secondary);
      font-size: 18px; cursor: pointer; padding: 6px 10px;
      transition: color 0.15s, border-color 0.15s; line-height: 1;
    }
    .back-btn:hover { color: var(--text-primary); border-color: var(--border2); }
    .table-header h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    .standings { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .standings-header {
      display: grid;
      grid-template-columns: 40px 1fr 48px 48px 48px 48px 56px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .standings-row {
      display: grid;
      grid-template-columns: 40px 1fr 48px 48px 48px 48px 56px;
      padding: 12px 16px; align-items: center;
      border-bottom: 1px solid var(--border); font-size: 14px;
      transition: background 0.15s;
    }
    .standings-row:last-child { border-bottom: none; }
    .standings-row:hover { background: var(--surface2); }
    .standings-header span, .standings-row span { text-align: center; }
    .standings-header span:nth-child(2), .standings-row span:nth-child(2) { text-align: left; }
    .pos { font-size: 13px; font-weight: 600; color: var(--text-muted); text-align: center; }
    .team-name { font-weight: 500; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
    .team-badge {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .stat { color: var(--text-secondary); font-size: 13px; text-align: center; }
    .pts { font-weight: 700; color: var(--text-primary); text-align: center; font-size: 14px; }
    .empty-notice {
      text-align: center; padding: 1.25rem;
      font-size: 13px; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    @media (max-width: 520px) {
      .standings-header, .standings-row {
        grid-template-columns: 32px 1fr 36px 36px 36px 36px 44px;
        font-size: 12px; padding: 10px;
      }
      .team-badge { display: none; }
    }
  </style>
</head>

function setUser(name, avatar) {
  ['nav-username','nav-username2'].forEach(id => document.getElementById(id).textContent = name);
  ['nav-avatar','nav-avatar2'].forEach(id => document.getElementById(id).src = avatar);
  document.getElementById('dash-avatar').src = avatar;
  document.getElementById('dash-username').textContent = name;
}

function openTable(sport) {
  const s = SPORTS[sport];
  document.getElementById('table-icon').textContent = s.icon;
  document.getElementById('table-title').textContent = s.label;
  const cols = s.cols;
  const colDef = `40px 1fr ${cols.map(() => '48px').join(' ')}`;
  let html = `<div class="standings-header" style="grid-template-columns:${colDef}">
    <span>#</span><span>Clube</span>${cols.map(c=>`<span>${c}</span>`).join('')}
  </div>`;
  html += s.teams.map((t,i) => {
    const stats = cols.map((c,ci) =>
      ci === cols.length-1
        ? `<span class="pts">0</span>`
        : `<span class="stat">0</span>`
    ).join('');
    return `<div class="standings-row" style="grid-template-columns:${colDef}">
      <span class="pos">${i+1}</span>
      <span class="team-name">
        <span class="team-badge" style="background:${t.color}22;color:${t.color}">${t.letter}</span>
        ${t.name}
      </span>
      ${stats}
    </div>`;
  }).join('');
  document.getElementById('standings-container').innerHTML = html;
  show('screen-table');
}

function goBack() { show('screen-dashboard'); }

// Ler dados do utilizador vindos do backend (?user=...&avatar=...)
const params = new URLSearchParams(window.location.search);
const user = params.get('user');
const avatar = params.get('avatar');

if (user && avatar) {
  setUser(decodeURIComponent(user), decodeURIComponent(avatar));
  show('screen-dashboard');
  // Limpar URL
  window.history.replaceState({}, '', '/');
}
</script>
